<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión · Locking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: {
            whale: { DEFAULT: '#f6186a', dark: '#d10f57', light: '#ff4f93' },
        } } } };
    </script>
</head>
<body class="font-sans">
    <div class="min-h-screen flex">
        <!-- Panel izquierdo -->
        <div class="hidden md:flex w-1/2 bg-gradient-to-br from-[#2b1020] via-[#7a0f43] to-whale text-white flex-col justify-center px-14">
            <div class="text-3xl font-extrabold tracking-tight mb-8">
                <span class="text-white">Locking</span> <span class="text-white/80">System</span>
            </div>
            <h1 class="text-5xl font-extrabold leading-tight">Bienvenido a<br>Locking System</h1>
            <p class="mt-6 text-white/70 max-w-sm">Gestiona la inhabilitación de tus televisores Locking System.</p>
        </div>

        <!-- Panel derecho: login -->
        <div class="w-full md:w-1/2 flex items-center justify-center bg-gray-50 px-6">
            <div class="w-full max-w-sm">
                <h2 class="text-2xl font-bold text-gray-800 mb-1">Iniciar sesión</h2>
                <p class="text-sm text-gray-500 mb-6">Inicia sesión con tu correo y contraseña</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="bg-red-100 text-red-700 px-4 py-2.5 rounded-lg text-sm mb-4">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1.5">Correo</label>
                        <input type="email" name="email" required autofocus placeholder="tu@correo.com"
                               class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-whale focus:ring-2 focus:ring-whale/20">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1.5">Contraseña</label>
                        <input type="password" name="password" required placeholder="••••••••"
                               class="w-full px-3.5 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-whale focus:ring-2 focus:ring-whale/20">
                    </div>
                    <button type="submit"
                            class="w-full py-2.5 rounded-lg bg-whale text-white font-semibold hover:bg-whale-dark transition">
                        Iniciar sesión
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
