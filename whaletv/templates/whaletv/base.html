<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Locking System{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23f6186a'%3E%3Cpath d='M3 7a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4c2.5.4 4 2.3 4 5 0 3-2.2 5-6 5-1.6 0-2.9-.4-3.9-1.2-.7.8-1.8 1.2-3.1 1.2H7a4 4 0 0 1-4-4V7Zm5 3a1.2 1.2 0 1 0 0 2.4A1.2 1.2 0 0 0 8 10Z'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        whale: { DEFAULT: '#f6186a', dark: '#d10f57', light: '#ff5a98' },
                        sidebar: '#1b1b21',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    boxShadow: {
                        card: '0 1px 2px rgba(16,24,40,.04), 0 4px 16px rgba(16,24,40,.06)',
                    },
                },
            },
        };
        if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');
        if (localStorage.sidebar === 'collapsed') document.documentElement.classList.add('side-collapsed');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        .btn { @apply inline-flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold cursor-pointer transition-all duration-150 no-underline select-none active:scale-[.97]; }
        .btn-sm { @apply px-2.5 py-1 text-xs rounded-md; }
        .btn-primary { @apply text-white bg-gradient-to-b from-whale to-whale-dark shadow-sm shadow-whale/30 hover:shadow-md hover:shadow-whale/40 hover:brightness-105; }
        .btn-ghost { @apply bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 hover:border-gray-300; }
        .btn-edit { @apply bg-sky-50 text-sky-700 border border-sky-100 hover:bg-sky-100; }
        .btn-del { @apply bg-rose-50 text-rose-700 border border-rose-100 hover:bg-rose-100; }
        .btn-pay { @apply bg-emerald-50 text-emerald-700 border border-emerald-100 hover:bg-emerald-100; }
        .btn-unpay { @apply bg-amber-50 text-amber-700 border border-amber-100 hover:bg-amber-100; }
        .btn-val { @apply bg-violet-50 text-violet-700 border border-violet-100 hover:bg-violet-100; }

        .card { @apply bg-white rounded-2xl border border-gray-100 shadow-card p-6; }

        .pill { @apply inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-semibold; }
        .pill-lock { @apply bg-rose-100 text-rose-700; }
        .pill-unlock { @apply bg-emerald-100 text-emerald-700; }
        .pill-due { @apply bg-amber-100 text-amber-700; }
        .pill-ok { @apply bg-sky-100 text-sky-700; }

        .inp { @apply w-full px-3.5 py-2.5 rounded-xl border border-gray-200 text-sm bg-white shadow-sm focus:outline-none focus:border-whale focus:ring-4 focus:ring-whale/10 transition; }
        .lbl { @apply block text-xs font-semibold text-gray-500 mb-1.5; }

        .msg { @apply px-4 py-3 rounded-xl text-sm mb-3 border; }
        .msg-success { @apply bg-emerald-50 text-emerald-700 border-emerald-100; }
        .msg-warning { @apply bg-amber-50 text-amber-700 border-amber-100; }
        .msg-error { @apply bg-rose-50 text-rose-700 border-rose-100; }

        .navlink { @apply flex items-center gap-3 mx-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition; }
        .navlink-active { @apply bg-whale/15 text-white; }

        .th { @apply px-4 py-3 text-left text-[0.7rem] font-semibold uppercase tracking-wider text-gray-400 bg-gray-50; }
        .td { @apply px-4 py-3.5 text-sm text-gray-700 border-b border-gray-100; }
    </style>
    <style>
        /* ---- Dark mode: paleta gris NEUTRA, a juego con el sidebar ---- */
        .dark body { background-color: #131316; }
        .dark .text-gray-900 { color: #f4f4f5 !important; }
        .dark .text-gray-800 { color: #e7e7ea !important; }
        .dark .text-gray-700 { color: #d4d4d8 !important; }
        .dark .text-gray-600 { color: #c2c2c8 !important; }
        .dark .text-gray-500 { color: #a1a1aa !important; }
        .dark .text-gray-400 { color: #9a9aa2 !important; }
        .dark .bg-white { background-color: #1d1d22 !important; }
        .dark .bg-gray-50 { background-color: #18181b !important; }
        .dark .bg-gray-100 { background-color: #131316 !important; }
        .dark .bg-gray-200 { background-color: #3a3a42 !important; }
        .dark .border-gray-100, .dark .border-gray-200, .dark .border-gray-300 { border-color: #2c2c33 !important; }
        .dark .ring-gray-100, .dark .ring-gray-200 { --tw-ring-color: #2c2c33 !important; }
        .dark .hover\:bg-gray-50:hover { background-color: #26262b !important; }
        .dark .divide-gray-100 > :not([hidden]) ~ :not([hidden]) { border-color: #2c2c33 !important; }

        .dark .card { background-color: #1d1d22 !important; box-shadow: none; border-color: #2c2c33 !important; }
        .dark .inp { background-color: #18181b !important; border-color: #3a3a42 !important; color: #f4f4f5 !important; }
        .dark .th { background-color: #1a1a1e !important; color: #a1a1aa !important; }
        .dark .td { color: #e7e7ea !important; border-color: #2c2c33 !important; }
        .dark .btn-ghost { background-color: #26262b !important; color: #e7e7ea !important; border-color: #3a3a42 !important; }
        .dark .lbl { color: #c2c2c8 !important; }
        .dark input[type="number"], .dark input[type="file"], .dark input[type="text"], .dark input[type="email"], .dark input[type="password"], .dark input[type="date"], .dark select {
            background-color: #18181b; border-color: #3a3a42; color: #f4f4f5;
        }
        /* ---- Sidebar colapsable ---- */
        #sidebar { transition: width .22s ease; }
        html.side-collapsed #sidebar { width: 4.75rem; }
        html.side-collapsed #sidebar .side-label { display: none; }
        html.side-collapsed #sidebar .nav-section { opacity: 0; }
        html.side-collapsed #sidebar .navlink { justify-content: center; margin-left: .55rem; margin-right: .55rem; padding-left: 0; padding-right: 0; }
        html.side-collapsed #sidebar .logo-wrap { justify-content: center; }
        html.side-collapsed #sidebar .theme-wrap { padding-left: .55rem; padding-right: .55rem; }
        html.side-collapsed #sidebar .theme-toggle { flex-direction: column; gap: .25rem; }
        html.side-collapsed #sidebar .user-wrap { padding-left: .55rem; padding-right: .55rem; }
        html.side-collapsed #sidebar .user-card { justify-content: center; padding-left: 0; padding-right: 0; }
        html.side-collapsed .toggle-chevron { transform: rotate(180deg); }

        /* Scrollbar sutil */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(120,120,130,.35); border-radius: 99px; border: 2px solid transparent; background-clip: content-box; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(160,160,170,.25); background-clip: content-box; }
    </style>
</head>
<body class="font-sans text-gray-900 bg-[#f4f5f7] antialiased">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 shrink-0 flex flex-col bg-gradient-to-b from-[#222228] to-[#141417] text-white">
            <!-- Logo -->
            <div class="logo-wrap px-5 py-5 flex items-center gap-2.5">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-whale-light to-whale-dark flex items-center justify-center shadow-lg shadow-whale/30 shrink-0">
                    <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M3 7a4 4 0 0 1 4-4h6a4 4 0 0 1 4 4c2.5.4 4 2.3 4 5 0 3-2.2 5-6 5-1.6 0-2.9-.4-3.9-1.2-.7.8-1.8 1.2-3.1 1.2H7a4 4 0 0 1-4-4V7Zm5 3a1.2 1.2 0 1 0 0 2.4A1.2 1.2 0 0 0 8 10Z"/></svg>
                </div>
                <div class="side-label text-xl font-extrabold tracking-tight">
                    <span class="text-white">Locking</span> <span class="text-whale-light">System</span>
                </div>
            </div>

            <div class="nav-section px-6 mt-2 mb-1 text-[0.65rem] uppercase tracking-widest text-white/30 font-semibold transition-opacity">Gestión</div>
            <nav class="flex-1 space-y-1">
                <a href="{% url 'televisor_list' %}" class="navlink {% block nav_tv %}{% endblock %}" title="Televisores">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2.5" y="4" width="19" height="12.5" rx="2"/><path d="M8 20.5h8M12 16.5v4"/></svg>
                    <span class="side-label">Televisores</span>
                </a>
            </nav>

            <!-- Toggle tema -->
            <div class="theme-wrap px-4 pb-3">
                <div class="theme-toggle flex items-center gap-1 bg-black/30 rounded-xl p-1">
                    <button type="button" id="btn-light" onclick="setTheme('light')" title="Modo claro"
                            class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-lg text-xs font-semibold transition">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
                        <span class="side-label">Light</span>
                    </button>
                    <button type="button" id="btn-dark" onclick="setTheme('dark')" title="Modo oscuro"
                            class="flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-lg text-xs font-semibold transition">
                        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
                        <span class="side-label">Dark</span>
                    </button>
                </div>
            </div>

            <!-- Usuario -->
            <div class="user-wrap px-4 pb-4">
                <div class="user-card bg-white/5 border border-white/10 rounded-xl px-3 py-2.5 flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-whale-light to-whale-dark flex items-center justify-center text-xs font-bold uppercase shrink-0">
                        {{ user.email|first }}
                    </div>
                    <span class="side-label text-xs text-white/70 truncate flex-1">{{ user.email }}</span>
                    <a href="{% url 'logout' %}" class="side-label text-white/40 hover:text-whale-light transition" title="Cerrar sesión">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M16 17l5-5-5-5M21 12H9M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
                    </a>
                </div>
            </div>

            <!-- Colapsar -->
            <div class="px-4 pb-4">
                <button type="button" onclick="toggleSidebar()" title="Ocultar / mostrar menú"
                        class="w-full flex items-center justify-center py-2 rounded-xl bg-white/5 border border-white/10 text-white/50 hover:text-white hover:bg-white/10 transition">
                    <svg class="toggle-chevron w-5 h-5 transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
                </button>
            </div>
        </aside>

        <!-- Contenido -->
        <main class="flex-1 min-w-0 overflow-auto">
            <div class="sticky top-0 z-10 backdrop-blur bg-[#f4f5f7]/80 dark:bg-[#131316]/80 px-8 py-4 border-b border-gray-100 text-sm text-gray-500">
                {% block breadcrumb %}<span class="text-whale font-medium">Devices Management</span>{% endblock %}
            </div>

            <div class="px-8 py-7">
                {% if messages %}
                    {% for message in messages %}
                        <div class="msg msg-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        function setTheme(t) {
            const html = document.documentElement;
            if (t === 'dark') { html.classList.add('dark'); localStorage.theme = 'dark'; }
            else { html.classList.remove('dark'); localStorage.theme = 'light'; }
            pintarBotones();
        }
        function toggleSidebar() {
            const html = document.documentElement;
            const colapsado = html.classList.toggle('side-collapsed');
            localStorage.sidebar = colapsado ? 'collapsed' : 'expanded';
        }
        function pintarBotones() {
            const dark = document.documentElement.classList.contains('dark');
            const light = document.getElementById('btn-light');
            const moon = document.getElementById('btn-dark');
            const activo = 'flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-lg text-xs font-semibold transition bg-whale text-white shadow-sm';
            const inactivo = 'flex-1 flex items-center justify-center gap-1.5 py-1.5 rounded-lg text-xs font-semibold transition text-white/40 hover:text-white';
            light.className = dark ? inactivo : activo;
            moon.className = dark ? activo : inactivo;
        }
        pintarBotones();
    </script>
</body>
</html>
